name: CI/CD Pipeline - Tooplate Site

on:
  push:
    branches: ["main"]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Build Docker Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/tooplate_site:v${{ github.run_number }} .

      - name: DockerHub Login
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/tooplate_site:v${{ github.run_number }}

      - name: Deploy to EC2
        run: |
          echo "${{ secrets.EC2_KEY }}" > key.pem
          chmod 600 key.pem

          ssh -o StrictHostKeyChecking=no -i key.pem ubuntu@${{ secrets.EC2_HOST }} << EOF
            sudo apt update -y
            sudo apt install docker.io -y
            sudo systemctl start docker
            sudo systemctl enable docker

            sudo docker pull ${{ secrets.DOCKER_USERNAME }}/tooplate_site:v${{ github.run_number }}

            sudo docker stop tooplate_site || true
            sudo docker rm tooplate_site || true

            sudo docker run -d -p 8081:80 -p 443:443 \
              --name tooplate_site \
              --restart always \
              ${{ secrets.DOCKER_USERNAME }}/tooplate_site:v${{ github.run_number }}
          EOF
