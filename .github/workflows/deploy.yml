name: CI/CD Pipeline - Tooplate Site

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Build Docker Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/tooplate-site:v${{ github.run_number }} .

      - name: DockerHub Login
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Push Docker Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/tooplate-site:v${{ github.run_number }}

      - name: Deploy to EC2
        run: |
          echo "${{ secrets.EC2_KEY }}" > key.pem
          chmod 600 key.pem
          ssh -o StrictHostKeyChecking=no -i key.pem ubuntu@${{ secrets.EC2_HOST }} << 'EOF'
            docker pull ${{ secrets.DOCKER_USERNAME }}/tooplate-site:v${{ github.run_number }}
            docker stop tooplate-site || true
            docker rm tooplate-site || true
            docker run -d -p 80:80 -p 443:443 --name tooplate-site --restart always ${{ secrets.DOCKER_USERNAME }}/tooplate-site:v${{ github.run_number }}
          EOF
